version: "3.9"

services:

  postgres_test:
    image: postgres:15-alpine
    container_name: equal_db_test
    environment:
      POSTGRES_USER: equal_test
      POSTGRES_PASSWORD: equal_test_password
      POSTGRES_DB: equal_test_db
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U equal_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis_test:
    image: redis:7-alpine
    container_name: equal_redis_test
    ports:
      - "6380:6379"